<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zulip Search</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    input[type="text"] { width: 100%; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 0.5rem; padding: 0.5rem 1.5rem; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>Zulip Search</h1>
  <form id="search-form">
    <input type="text" id="query" placeholder="Enter search query..." required>
    <button type="submit">Search</button>
  </form>
  <script>
    document.getElementById("search-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const q = document.getElementById("query").value.trim();
      window.location.href = `/conversation?q=${encodeURIComponent(q)}`;
    });
  </script>
</body>
</html>
