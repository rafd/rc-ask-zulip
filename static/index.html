<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ask RC Zulip</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    input[type="text"] { width: 100%; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 0.5rem; padding: 0.5rem 1.5rem; font-size: 1rem; }
    h2 { font-size: 1rem; margin-top: 2rem; color: #555; }
    .past-list { list-style: none; padding: 0; margin: 0; }
    .past-list li { padding: 0.4rem 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
    .past-list a { text-decoration: none; color: #1a0dab; flex: 1; }
    .past-list a:hover { text-decoration: underline; }
    .past-list .ts { font-size: 0.8rem; color: #888; white-space: nowrap; }
  </style>
</head>
<body>
  <h1>Ask RC Zulip</h1>
  <nav style="margin-bottom:1rem; font-size:0.9rem;">
    <a href="/pair" style="color:#1a0dab; text-decoration:none;">Find someone to pair with →</a>
  </nav>
  <form id="search-form">
    <input type="text" id="query" placeholder="What do RCers think about…" required>
    <button type="submit">Ask</button>
  </form>

  <h2>Past conversations</h2>
  <ul class="past-list" id="past-list"><li style="color:#888">Loading…</li></ul>

  <script>
    document.getElementById("search-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const q = document.getElementById("query").value.trim();
      window.location.href = `/conversation?q=${encodeURIComponent(q)}`;
    });

    async function loadPast() {
      const listEl = document.getElementById("past-list");
      try {
        const res = await fetch("/conversations");
        const rows = await res.json();
        if (rows.length === 0) {
          listEl.innerHTML = '<li style="color:#888">No conversations yet.</li>';
          return;
        }
        listEl.innerHTML = "";
        for (const row of rows) {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = `/conversation?id=${row.id}`;
          a.textContent = row.query;
          const ts = document.createElement("span");
          ts.className = "ts";
          ts.textContent = new Date(row.created_at).toLocaleString();
          li.appendChild(a);
          li.appendChild(ts);
          listEl.appendChild(li);
        }
      } catch {
        listEl.innerHTML = '<li style="color:#888">Could not load past conversations.</li>';
      }
    }

    loadPast();
  </script>
</body>
</html>
