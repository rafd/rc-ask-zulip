<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ask RC Zulip</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    a { color: inherit; }
    h2 { font-size: 1.1rem; font-weight: normal; color: #555; margin-bottom: 1.5rem; }
    .message { margin-bottom: 1rem; border-radius: 6px; padding: 0.75rem 1rem; }
    .message.assistant { background: #f0f4ff; }
    .message.tool { background: #f4f4f4; font-family: monospace; font-size: 0.85rem; }
    .message.tool pre { margin: 0; white-space: pre-wrap; }
    .role { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: #888; margin-bottom: 0.25rem; }
    .tool-call { color: #555; }
    .tool-call code { background: #e8e8e8; padding: 0.1em 0.3em; border-radius: 3px; }
    #view-toggle { margin-bottom: 1rem; font-size: 0.85rem; }
    #view-toggle button { padding: 0.25rem 0.75rem; cursor: pointer; }
    #view-toggle button.active { font-weight: bold; background: #ddd; }
    .final-answer { background: #eaffea; border-left: 4px solid #4caf50; padding: 1rem; border-radius: 4px; margin-top: 1.5rem; }
    #status { color: #888; font-style: italic; }
    #error { color: red; }
  </style>
</head>
<body>
  <p><a href="/">&larr; New question</a></p>
  <h2 id="question"></h2>
  <p id="status">Thinking...</p>
  <p id="error"></p>
  <div id="view-toggle" style="display:none">
    <button id="btn-nice" class="active" onclick="setView('nice')">Nice</button>
    <button id="btn-debug" onclick="setView('debug')">Debug</button>
  </div>
  <div id="conversation"></div>
  <div id="conversation-debug" style="display:none"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const q = params.get("q") || "";
    const convId = params.get("id") || "";
    document.getElementById("question").textContent = q;
    document.title = q ? `${q} — Ask RC Zulip` : "Ask RC Zulip";

    function render(messages, finalAnswer, convEl) {
      document.getElementById("view-toggle").style.display = "";

      const debugEl = document.getElementById("conversation-debug");
      const allMessages = messages.map(m => {
        if (m.role === "tool") {
          let parsed; try { parsed = JSON.parse(m.content); } catch { parsed = m.content; }
          return { ...m, content: parsed };
        }
        return m;
      });
      const pre = document.createElement("pre");
      pre.style.cssText = "background:#f4f4f4; padding:1rem; border-radius:6px; overflow:auto; font-size:0.8rem; white-space:pre-wrap;";
      pre.textContent = JSON.stringify(allMessages, null, 2);
      debugEl.appendChild(pre);

      const messageById = {};
      for (const msg of messages) {
        if (msg.role === "tool") {
          let parsed; try { parsed = JSON.parse(msg.content); } catch { parsed = null; }
          if (Array.isArray(parsed)) {
            for (const m of parsed) messageById[m.id] = m;
          }
        }
      }

      for (const msg of messages) {
        if (msg.role === "system" || msg.role === "user") continue;

        const div = document.createElement("div");

        if (msg.role === "assistant" && msg.tool_calls) {
          continue;
        } else if (msg.role === "tool") {
          continue;
        } else if (msg.role === "assistant" && msg.content) {
          div.className = "message assistant final-answer";
          const roleEl = document.createElement("div");
          roleEl.className = "role";
          roleEl.textContent = "answer";
          div.appendChild(roleEl);

          let sections;
          try { sections = JSON.parse(msg.content); } catch { sections = null; }

          if (Array.isArray(sections)) {
            for (const section of sections) {
              if (section.text) {
                const p = document.createElement("p");
                p.style.cssText = "margin:0 0 0.75rem 0; white-space:pre-wrap;";
                p.textContent = section.text;
                div.appendChild(p);
              } else if (Array.isArray(section.message_ids)) {
                const citeBlock = document.createElement("div");
                citeBlock.style.cssText = "margin-bottom:0.75rem;";
                for (const id of section.message_ids) {
                  const m = messageById[id];
                  if (!m) continue;
                  const item = document.createElement("div");
                  item.style.cssText = "margin-bottom:0.5rem; border-left:3px solid #4caf50; padding-left:0.75rem; background:#f8fff8; border-radius:0 4px 4px 0;";
                  const meta = document.createElement("div");
                  meta.style.cssText = "font-size:0.75rem; color:#888; margin-bottom:0.2rem;";
                  meta.textContent = `#${m.display_recipient} > ${m.subject}`;
                  const body = document.createElement("div");
                  body.style.cssText = "font-size:0.9rem; white-space:pre-wrap;";
                  body.textContent = m.content;
                  item.appendChild(meta);
                  item.appendChild(body);
                  citeBlock.appendChild(item);
                }
                div.appendChild(citeBlock);
              }
            }
          } else {
            const p = document.createElement("p");
            p.style.cssText = "margin:0; white-space:pre-wrap;";
            p.textContent = msg.content;
            div.appendChild(p);
          }
        }

        if (div.className) convEl.appendChild(div);
      }
    }

    async function load() {
      const statusEl = document.getElementById("status");
      const errorEl = document.getElementById("error");
      const convEl = document.getElementById("conversation");

      try {
        if (convId) {
          statusEl.textContent = "";
          const res = await fetch(`/conversation-data/${encodeURIComponent(convId)}`);
          if (!res.ok) throw new Error(`Server error: ${res.status}`);
          const row = await res.json();
          document.getElementById("question").textContent = row.query;
          document.title = `${row.query} — Ask RC Zulip`;
          render(row.messages, row.final_answer, convEl);
          return;
        }
        const res = await fetch(`/ask?q=${encodeURIComponent(q)}`);
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        statusEl.textContent = "";
        history.replaceState(null, "", `/conversation?id=${data.id}`);
        render(data.messages, data.final_answer, convEl);
      } catch (err) {
        statusEl.textContent = "";
        errorEl.textContent = `Error: ${err.message}`;
      }
    }

    function setView(v) {
      document.getElementById("conversation").style.display = v === "nice" ? "" : "none";
      document.getElementById("conversation-debug").style.display = v === "debug" ? "" : "none";
      document.getElementById("btn-nice").classList.toggle("active", v === "nice");
      document.getElementById("btn-debug").classList.toggle("active", v === "debug");
    }

    load();
  </script>
</body>
</html>
