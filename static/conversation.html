<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ask RC Zulip</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    a { color: inherit; }
    h2 { font-size: 1.1rem; font-weight: normal; color: #555; margin-bottom: 1.5rem; }
    .message { margin-bottom: 1rem; border-radius: 6px; padding: 0.75rem 1rem; }
    .message.assistant { background: #f0f4ff; }
    .message.tool { background: #f4f4f4; font-family: monospace; font-size: 0.85rem; }
    .message.tool pre { margin: 0; white-space: pre-wrap; }
    .role { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: #888; margin-bottom: 0.25rem; }
    .tool-call { color: #555; }
    .tool-call code { background: #e8e8e8; padding: 0.1em 0.3em; border-radius: 3px; }
    #view-toggle { margin-bottom: 1rem; font-size: 0.85rem; }
    #view-toggle button { padding: 0.25rem 0.75rem; cursor: pointer; }
    #view-toggle button.active { font-weight: bold; background: #ddd; }
    .final-answer { background: #eaffea; border-left: 4px solid #4caf50; padding: 1rem; border-radius: 4px; margin-top: 1.5rem; }
    .final-answer h3.answer-section-heading { font-size: 1.05rem; font-weight: 600; color: #1b5e20; margin: 1rem 0 0.35rem 0; line-height: 1.3; }
    .final-answer h3.answer-section-heading:first-of-type { margin-top: 0; }
    #status { color: #888; font-style: italic; }
    #error { color: red; }
    .spoiler-block { border: 1px solid #ddd; border-radius: 4px; margin: 0.5rem 0; overflow: hidden; }
    .spoiler-header { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 0.75rem; background: #f4f4f4; cursor: pointer; user-select: none; }
    .spoiler-header:hover { background: #eaeaea; }
    .spoiler-title { font-size: 0.85rem; color: #555; font-style: italic; }
    .spoiler-toggle { font-size: 0.75rem; color: #888; }
    .spoiler-content { padding: 0.75rem; display: none; }
    .spoiler-content.open { display: block; }
    .cite-details { margin-bottom: 0.75rem; border: 1px solid #c8e6c9; border-radius: 8px; overflow: hidden; background: #fafefa; }
    .cite-summary { list-style: none; cursor: pointer; padding: 0.55rem 0.85rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; font-size: 0.9rem; color: #2e7d32; font-weight: 500; user-select: none; background: linear-gradient(180deg, #e8f5e9 0%, #dff3e0 100%); transition: background 0.15s ease; }
    .cite-summary::-webkit-details-marker { display: none; }
    .cite-summary:hover { background: #d4ecd6; }
    .cite-details[open] > .cite-summary { border-bottom: 1px solid #c8e6c9; }
    .cite-summary-text { flex: 1; }
    .cite-summary-chevron { display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; font-size: 0.85rem; font-weight: 700; line-height: 1; color: #43a047; transition: transform 0.2s ease; }
    .cite-details[open] .cite-summary-chevron { transform: rotate(90deg); }
    .cite-details-inner { padding: 0.65rem 0.75rem 0.35rem; background: #fafefa; }
    .cite-item { margin-bottom: 0.5rem; border-left: 3px solid #4caf50; padding-left: 0.75rem; background: #f8fff8; border-radius: 0 4px 4px 0; }
    .cite-meta { font-size: 0.75rem; color: #888; margin-bottom: 0.2rem; }
    .cite-body { font-size: 0.9rem; max-height: 6rem; overflow: hidden; position: relative; }
    .cite-body.is-expanded { max-height: none; overflow: visible; }
    .cite-expand { display: none; font-size: 0.75rem; color: #4caf50; background: none; border: none; padding: 0.25rem 0; cursor: pointer; }
    .cite-expand.is-visible { display: block; }
    .answer-text { margin: 0 0 0.75rem 0; }
    .answer-text > .answer-text-para { margin: 0 0 0.5rem 0; white-space: pre-wrap; }
    .answer-text > .answer-text-para:last-child { margin-bottom: 0; }
    .answer-text > .answer-text-list { margin: 0.5rem 0; padding-left: 1.35rem; list-style-type: disc; }
    .answer-text > .answer-text-list:first-child { margin-top: 0; }
    .answer-text > .answer-text-list:last-child { margin-bottom: 0; }
    .answer-text > .answer-text-list li { margin-bottom: 0.35rem; }
    .answer-text > .answer-text-list li:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
  <p><a href="/">&larr; New question</a></p>
  <h2 id="question"></h2>
  <p id="status">Thinking...</p>
  <p id="error"></p>
  <div id="view-toggle" style="display:none">
    <button id="btn-nice" class="active" onclick="setView('nice')">Nice</button>
    <button id="btn-debug" onclick="setView('debug')">Debug</button>
  </div>
  <div id="conversation"></div>
  <div id="conversation-debug" style="display:none"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const q = params.get("q") || "";
    const convId = params.get("id") || "";
    document.getElementById("question").textContent = q;
    document.title = q ? `${q} — Ask RC Zulip` : "Ask RC Zulip";

    const MD_BULLET_LINE = /^\s*[-*+]\s+(.*)$/;

    /** Plain-text + markdown-style bullets (-, *, +) → <p> and <ul><li> (safe: text nodes only). */
    function appendAnswerTextBlocks(container, text) {
      const lines = String(text).replace(/\r\n/g, "\n").split("\n");
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        if (line.trim() === "") {
          i++;
          continue;
        }
        if (MD_BULLET_LINE.test(line)) {
          const ul = document.createElement("ul");
          ul.className = "answer-text-list";
          while (i < lines.length) {
            const m = MD_BULLET_LINE.exec(lines[i]);
            if (!m) break;
            const li = document.createElement("li");
            li.textContent = m[1];
            ul.appendChild(li);
            i++;
          }
          container.appendChild(ul);
          continue;
        }
        const paraLines = [];
        while (i < lines.length) {
          const l = lines[i];
          if (l.trim() === "") break;
          if (MD_BULLET_LINE.test(l)) break;
          paraLines.push(l);
          i++;
        }
        if (paraLines.length) {
          const p = document.createElement("p");
          p.className = "answer-text-para";
          p.textContent = paraLines.join("\n");
          container.appendChild(p);
        }
      }
    }

    function initSpoilers(container) {
      for (const block of container.querySelectorAll(".spoiler-block")) {
        const header = block.querySelector(".spoiler-header");
        const content = block.querySelector(".spoiler-content");
        if (!header || !content) continue;

        const title = document.createElement("span");
        title.className = "spoiler-title";
        title.textContent = header.textContent.trim() || "Spoiler";
        header.textContent = "";

        const toggle = document.createElement("span");
        toggle.className = "spoiler-toggle";
        toggle.textContent = "▶ show";

        header.appendChild(title);
        header.appendChild(toggle);

        header.addEventListener("click", () => {
          const open = content.classList.toggle("open");
          toggle.textContent = open ? "▼ hide" : "▶ show";
        });
      }
    }

    function render(messages, finalAnswer, convEl) {
      document.getElementById("view-toggle").style.display = "";

      const debugEl = document.getElementById("conversation-debug");
      const allMessages = messages.map(m => {
        if (m.role === "tool") {
          let parsed; try { parsed = JSON.parse(m.content); } catch { parsed = m.content; }
          return { ...m, content: parsed };
        }
        return m;
      });
      const pre = document.createElement("pre");
      pre.style.cssText = "background:#f4f4f4; padding:1rem; border-radius:6px; overflow:auto; font-size:0.8rem; white-space:pre-wrap;";
      pre.textContent = JSON.stringify(allMessages, null, 2);
      debugEl.appendChild(pre);

      const messageById = {};
      for (const msg of messages) {
        if (msg.role === "tool") {
          let parsed; try { parsed = JSON.parse(msg.content); } catch { parsed = null; }
          if (Array.isArray(parsed)) {
            for (const m of parsed) messageById[m.id] = m;
          }
        }
      }

      for (const msg of messages) {
        if (msg.role === "system" || msg.role === "user") continue;

        const div = document.createElement("div");

        if (msg.role === "assistant" && msg.tool_calls) {
          const queries = msg.tool_calls.flatMap(tc => {
            try { return JSON.parse(tc.function.arguments).queries || []; } catch { return []; }
          });
          if (queries.length === 0) continue;
          div.className = "message tool";
          const roleEl = document.createElement("div");
          roleEl.className = "role";
          roleEl.textContent = "searched";
          div.appendChild(roleEl);
          const tagLine = document.createElement("div");
          tagLine.style.cssText = "display:flex; flex-wrap:wrap; gap:0.35rem; margin-top:0.25rem;";
          for (const q of queries) {
            const tag = document.createElement("span");
            tag.style.cssText = "background:#e8e8e8; border-radius:3px; padding:0.15em 0.5em; font-size:0.85rem; font-family:monospace;";
            tag.textContent = q;
            tagLine.appendChild(tag);
          }
          div.appendChild(tagLine);
        } else if (msg.role === "tool") {
          continue;
        } else if (msg.role === "assistant" && msg.content) {
          div.className = "message assistant final-answer";
          const roleEl = document.createElement("div");
          roleEl.className = "role";
          roleEl.textContent = "answer";
          div.appendChild(roleEl);

          let sections;
          try {
            const parsed = JSON.parse(msg.content);
            sections = Array.isArray(parsed) ? parsed : parsed?.sections ?? null;
          } catch { sections = null; }

          if (Array.isArray(sections)) {
            for (const section of sections) {
              if ("heading" in section && typeof section.heading === "string" && section.heading.trim()) {
                const h = document.createElement("h3");
                h.className = "answer-section-heading";
                h.textContent = section.heading.trim();
                div.appendChild(h);
              }
              if (section.text) {
                const wrap = document.createElement("div");
                wrap.className = "answer-text";
                appendAnswerTextBlocks(wrap, section.text);
                if (wrap.firstChild) div.appendChild(wrap);
              }
              if (Array.isArray(section.message_ids)) {
                const inner = document.createElement("div");
                inner.className = "cite-details-inner";
                for (const id of section.message_ids) {
                  const m = messageById[id];
                  if (!m) continue;
                  const item = document.createElement("div");
                  item.className = "cite-item";
                  const meta = document.createElement("div");
                  meta.className = "cite-meta";
                  const ts = m.timestamp ? new Date(m.timestamp * 1000).toLocaleString() : "";
                  meta.textContent = `#${m.display_recipient} > ${m.subject}${ts ? " · " + ts : ""}`;
                  const body = document.createElement("div");
                  body.className = "cite-body";
                  body.innerHTML = m.content;
                  initSpoilers(body);
                  item.appendChild(meta);
                  item.appendChild(body);
                  const expand = document.createElement("button");
                  expand.type = "button";
                  expand.className = "cite-expand";
                  expand.textContent = "Show more";
                  expand.onclick = () => {
                    body.classList.add("is-expanded");
                    expand.classList.remove("is-visible");
                  };
                  item.appendChild(expand);
                  requestAnimationFrame(() => {
                    if (body.scrollHeight > body.clientHeight) expand.classList.add("is-visible");
                  });
                  inner.appendChild(item);
                }
                if (inner.childElementCount > 0) {
                  const details = document.createElement("details");
                  details.className = "cite-details";
                  const summary = document.createElement("summary");
                  summary.className = "cite-summary";
                  const sumLabel = document.createElement("span");
                  sumLabel.className = "cite-summary-text";
                  sumLabel.textContent = "See what people are saying";
                  const chevron = document.createElement("span");
                  chevron.className = "cite-summary-chevron";
                  chevron.setAttribute("aria-hidden", "true");
                  chevron.textContent = ">";
                  summary.appendChild(sumLabel);
                  summary.appendChild(chevron);
                  details.appendChild(summary);
                  details.appendChild(inner);
                  div.appendChild(details);
                }
              }
            }
          } else {
            const p = document.createElement("p");
            p.style.cssText = "margin:0; white-space:pre-wrap;";
            p.textContent = msg.content;
            div.appendChild(p);
          }
        }

        if (div.className) convEl.appendChild(div);
      }
    }

    function getProgressMessage(step, data) {
      switch (step) {
        case "searching_zulip":
          return `Searching Zulip for: "${data.query}"`;
        case "search_complete":
          return `Found ${data.count} messages`;
        case "agent_turn":
          return `Agent turn ${data.turn}/${data.max}`;
        case "tool_search":
          const qs = Array.isArray(data.queries) ? data.queries.join(", ") : "";
          return `Searching for: ${qs}`;
        case "tool_search_complete":
          return `Found ${data.count} more messages`;
        case "finalizing_answer":
          return "Generating final answer...";
        default:
          return `Progress: ${step}`;
      }
    }

    async function loadStreaming() {
      const statusEl = document.getElementById("status");
      const errorEl = document.getElementById("error");
      const convEl = document.getElementById("conversation");

      try {
        const eventSource = new EventSource(`/ask-stream?q=${encodeURIComponent(q)}`);

        eventSource.onmessage = (event) => {
          try {
            const { step, data } = JSON.parse(event.data);

            if (step === "complete") {
              eventSource.close();
              statusEl.textContent = "";
              history.replaceState(null, "", `/conversation?id=${data.id}`);
              convEl.innerHTML = "";
              render([], data.final_answer, convEl);
            } else if (step === "error") {
              eventSource.close();
              statusEl.textContent = "";
              errorEl.textContent = `Error: ${data.message}`;
            } else {
              const msg = getProgressMessage(step, data);
              statusEl.textContent = msg;
            }
          } catch (err) {
            console.error("Error parsing event:", err);
          }
        };

        eventSource.onerror = () => {
          eventSource.close();
          statusEl.textContent = "";
          errorEl.textContent = "Connection lost";
        };
      } catch (err) {
        statusEl.textContent = "";
        errorEl.textContent = `Error: ${err.message}`;
      }
    }

    async function load() {
      const statusEl = document.getElementById("status");
      const errorEl = document.getElementById("error");
      const convEl = document.getElementById("conversation");

      try {
        if (convId) {
          statusEl.textContent = "";
          const res = await fetch(`/conversation-data/${encodeURIComponent(convId)}`);
          if (!res.ok) throw new Error(`Server error: ${res.status}`);
          const row = await res.json();
          document.getElementById("question").textContent = row.query;
          document.title = `${row.query} — Ask RC Zulip`;
          render(row.messages, row.final_answer, convEl);
          return;
        }
        loadStreaming();
      } catch (err) {
        statusEl.textContent = "";
        errorEl.textContent = `Error: ${err.message}`;
      }
    }

    function setView(v) {
      document.getElementById("conversation").style.display = v === "nice" ? "" : "none";
      document.getElementById("conversation-debug").style.display = v === "debug" ? "" : "none";
      document.getElementById("btn-nice").classList.toggle("active", v === "nice");
      document.getElementById("btn-debug").classList.toggle("active", v === "debug");
    }

    load();
  </script>
</body>
</html>
